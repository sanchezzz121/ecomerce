<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Seus estilos -->
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/colors.css">

    <title>Produto - Renascer</title>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top px-5 w-100" style="background-color: var(--fe-preto-fogo);"
        id="mynav">
        <div class="container-fluid">
            <a class="navbar-brand" href="../../index.html">
                <img src="../img/home/Renacer_ Cross and Roots.png" class="img-fluid" alt="">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mylinks"
                aria-controls="mylinks" aria-expanded="false" aria-label="Alternar navegação">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mylinks">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a href="../../index.html" class="nav-link active">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Product Section -->
    <main class="container my-5 pt-5">
        <div class="row align-items-center g-4 my-5">
            <!-- Galeria de imagens -->
            <div class="col-lg-6 d-flex flex-column align-items-center imgPrincioal">
                <img src="../img/produtos/main.jpg" class="img-fluid rounded main-image mb-3" alt="Produto principal">
                <div class="d-flex justify-content-start gap-2">
                    <img src="../img/produtos/thumb1.jpg" class="img-fluid rounded thumb-image img1" alt="Imagem 1">
                    <img src="../img/produtos/thumb2.jpg" class="img-fluid rounded thumb-image img2" alt="Imagem 2">
                    <img src="../img/produtos/thumb3.jpg" class="img-fluid rounded thumb-image img3" alt="Imagem 3">
                </div>
            </div>

            <!-- Informações do produto -->
            <div class="col-lg-6 d-flex flex-column justify-content-center text-center text-lg-start">
                <h1 class="product-title">Nome do Produto</h1>
                <p class="product-desc">
                    Descrição detalhada do produto. Aqui você pode colocar informações sobre materiais, tamanhos,
                    funcionalidades e tudo que for relevante.
                </p>
                <p class="product-price">R$ 299,99</p>

                <div class="d-flex gap-2 mt-3 justify-content-center justify-content-lg-start">
                    <button class="btn btn-primary btn-lg">Comprar Agora</button>
                    <button class="btn btn-outline-warning btn-lg cart-button">
                        <i class="bi bi-cart-fill"></i> Adicionar ao Carrinho
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        crossorigin="anonymous"></script>
    <script src="../scripts/images.js"></script>
    <script src="../scripts/dinamicsurl.js" type="module"></script>
</body>

</html>
